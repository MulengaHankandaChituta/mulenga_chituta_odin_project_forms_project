<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Odin Forms Project</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
<!-- Left side background image -->
<div class="left-side"></div>
<! right side content and form -->
<div class="right-side">
<p>This is not a real online service! You know you need something
like this in your life to help you realize your deepest dreams.
Sign up now to get started.</p>
<p>You know you want to.</p>
<h3>Let's Do this!</h3>
<form action="create_password" method="post">
<div class="form-group">
<label>First Name</label>
<input type="text">
</div>
<div class="form-group">
<label>Last Name</label>
<input type="text">
</div>
<div class="form-group">
<label>Email</label>
<input type="email">
</div>
<div class="form-group">
<label>Phone Number</label>
<input type="tel">
</div>
<div class="form-group">
<label>Password</label>
<input type="password">
</div>
<div class="form-group">
<label>Confirm Password</label>
<input type="password">
</div>
<button type="submit">Create Account</button>
<h4>Already have an account? Log in</h4>
</form>
</div>
</div>
<div class="left-side">
    <img src="images/odin-logo.png" alt="Odin Logo" class="logo">
 </div>   
</body>
</html>
